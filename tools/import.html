<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook — 資料匯入工具</title>
  <style>
    :root {
      --bg: #080c12; --surface: #111820; --card: #19232f;
      --border: rgba(255,255,255,0.08); --border-med: rgba(255,255,255,0.14);
      --accent: #00b4d8; --green: #1ec86a; --amber: #f0a030; --red: #e04040;
      --text: #d8e8f4; --text-dim: #6888a0;
      --font-mono: 'B612 Mono', monospace; --font-ui: 'B612', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui);
           min-height: 100vh; padding: 32px 24px; max-width: 640px; margin: 0 auto; }
    h1 { font-family: var(--font-mono); font-size: 18px; letter-spacing: 0.2em;
         color: var(--accent); margin-bottom: 8px; }
    p  { color: var(--text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border-med);
            border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 13px; color: var(--text); margin-bottom: 16px; font-weight: 700; }
    label { display: block; font-size: 11px; font-family: var(--font-mono);
            letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 8px; }
    input[type=text], input[type=password] {
      width: 100%; background: var(--card); border: 1px solid var(--border-med);
      border-radius: 6px; color: var(--text); font-size: 14px; padding: 10px 14px;
      outline: none; font-family: var(--font-mono); margin-bottom: 12px; }
    input:focus { border-color: var(--accent); }
    .file-drop {
      border: 2px dashed var(--border-med); border-radius: 10px;
      padding: 40px; text-align: center; cursor: pointer;
      color: var(--text-dim); transition: border-color 0.2s; margin-bottom: 16px; }
    .file-drop.over { border-color: var(--accent); color: var(--accent); }
    .file-drop input { display: none; }
    button {
      background: var(--accent); color: var(--bg); border: none; border-radius: 6px;
      font-size: 15px; font-weight: 700; padding: 13px 24px; cursor: pointer;
      width: 100%; margin-bottom: 10px; font-family: var(--font-ui);
      transition: opacity 0.15s; }
    button:disabled { opacity: 0.4; cursor: default; }
    button:not(:disabled):active { opacity: 0.8; }
    button.secondary { background: var(--card); color: var(--text-dim);
                       border: 1px solid var(--border-med); }
    button.green { background: var(--green); }
    #log { background: var(--card); border-radius: 8px; padding: 16px;
           font-family: var(--font-mono); font-size: 12px; line-height: 1.6;
           max-height: 300px; overflow-y: auto; color: var(--text-dim); }
    .log-ok  { color: var(--green); }
    .log-err { color: var(--red); }
    .log-inf { color: var(--accent); }
    .log-warn{ color: var(--amber); }
    progress {
      width: 100%; height: 6px; border-radius: 3px;
      background: var(--card); margin-bottom: 12px; }
    progress::-webkit-progress-bar { background: var(--card); border-radius: 3px; }
    progress::-webkit-progress-value { background: var(--accent); border-radius: 3px; }
    .stat-row { display: flex; gap: 16px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: var(--card); border-radius: 8px; padding: 12px;
                text-align: center; }
    .stat-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700;
                color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>
  <h1>LOGBOOK IMPORT</h1>
  <p>一次性批次匯入工具 — 將 3,181 筆歷史飛行記錄與 144 位機師名單寫入 Firebase Firestore。<br>
     以 objectId 為 document ID，重複執行不會重複匯入（merge mode）。</p>

  <!-- Step 1: Firebase 連線（自動填入） -->
  <div class="card">
    <div class="card-title">Step 1 — Firebase 連線</div>
    <label>API Key</label>
    <input type="text" id="cfg-apikey" value="AIzaSyCArGgLWdA1ExDLdpVEmBDteVWGDzLIhmI">
    <label>Project ID</label>
    <input type="text" id="cfg-projectid" value="pilot-logbook-ef111">
    <label>Auth Domain</label>
    <input type="text" id="cfg-authdomain" value="pilot-logbook-ef111.firebaseapp.com">
    <button id="btn-connect" class="secondary">連接 Firebase</button>
    <div id="connect-status" style="font-size:12px;color:var(--text-dim);margin-top:8px"></div>
  </div>

  <!-- Step 2: 登入 -->
  <div class="card" id="auth-card" style="display:none">
    <div class="card-title">Step 2 — 登入帳號</div>
    <p>請用你的 Google 帳號登入，確保資料寫入正確的 UID。</p>
    <button id="btn-login">Google 登入</button>
    <div id="auth-status" style="font-size:12px;color:var(--text-dim)"></div>
  </div>

  <!-- Step 3: 載入資料 -->
  <div class="card" id="file-card" style="display:none">
    <div class="card-title">Step 3 — 載入 logbook.json</div>

    <!-- 優先：從伺服器一鍵載入 -->
    <button id="btn-load-server" class="green" style="margin-bottom:16px">
      ⬇ 從伺服器直接載入（推薦）
    </button>

    <p style="text-align:center;margin:8px 0;font-size:12px">— 或手動選擇本機檔案 —</p>

    <div class="file-drop" id="file-drop">
      <input type="file" id="file-input" accept=".json">
      <div style="font-size:32px;margin-bottom:8px">📂</div>
      <div>點擊選擇或拖入 logbook.json</div>
      <div id="file-name" style="margin-top:8px;color:var(--accent)"></div>
    </div>

    <!-- 資料摘要 -->
    <div id="data-summary" style="display:none">
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-val" id="sum-flights">0</div>
          <div class="stat-lbl">航班記錄</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="sum-crew">0</div>
          <div class="stat-lbl">機師名單</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="sum-range">—</div>
          <div class="stat-lbl">日期範圍</div>
        </div>
      </div>
      <button id="btn-import">開始匯入（航班 + 機師）</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-card" style="display:none">
    <div class="card-title">匯入進度</div>
    <div id="phase-label" style="font-size:12px;color:var(--text-dim);margin-bottom:8px"></div>
    <progress id="progress-bar" value="0" max="100"></progress>
    <div id="progress-text" style="font-size:12px;color:var(--text-dim);margin-bottom:12px"></div>
    <div id="log"></div>
  </div>

  <script type="module">
    import { initializeApp }                              from 'firebase/app'
    import { getAuth, GoogleAuthProvider,
             signInWithPopup, onAuthStateChanged }        from 'firebase/auth'
    import { getFirestore, collection, doc,
             writeBatch, setDoc, serverTimestamp }        from 'firebase/firestore'

    let app, auth, db, uid
    let jsonData   = null  // 航班陣列
    let crewList   = []    // 從航班中提取的機師

    // ── Step 1: 連線 ───────────────────────────────
    document.getElementById('btn-connect').addEventListener('click', () => {
      const apiKey     = document.getElementById('cfg-apikey').value.trim()
      const projectId  = document.getElementById('cfg-projectid').value.trim()
      const authDomain = document.getElementById('cfg-authdomain').value.trim()
      if (!apiKey || !projectId) {
        setStatus('connect-status', '請填入 API Key 和 Project ID', 'red')
        return
      }
      try {
        app  = initializeApp({ apiKey, authDomain, projectId }, 'import-app')
        auth = getAuth(app)
        db   = getFirestore(app)
        setStatus('connect-status', '✓ 已連接 Firebase', 'green')
        show('auth-card')

        onAuthStateChanged(auth, user => {
          if (user) {
            uid = user.uid
            setStatus('auth-status', `✓ 已登入：${user.email}`, 'green')
            show('file-card')
          }
        })
      } catch (e) {
        setStatus('connect-status', '連接失敗：' + e.message, 'red')
      }
    })

    // ── Step 2: 登入 ───────────────────────────────
    document.getElementById('btn-login').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider())
      } catch (e) {
        setStatus('auth-status', '登入失敗：' + e.message, 'red')
      }
    })

    // ── Step 3a: 從伺服器載入 ──────────────────────
    document.getElementById('btn-load-server').addEventListener('click', async () => {
      const btn = document.getElementById('btn-load-server')
      btn.disabled = true
      btn.textContent = '載入中…'
      try {
        const res  = await fetch('../data/logbook.json')
        if (!res.ok) throw new Error(`HTTP ${res.status}`)
        const data = await res.json()
        loadData(data)
        btn.textContent = '✓ 已從伺服器載入'
      } catch (e) {
        btn.disabled = false
        btn.textContent = '⬇ 從伺服器直接載入（推薦）'
        document.getElementById('file-name').textContent = '⚠ 伺服器載入失敗：' + e.message
        document.getElementById('file-name').style.color = 'var(--red)'
      }
    })

    // ── Step 3b: 手動選擇檔案 ─────────────────────
    const fileInput = document.getElementById('file-input')
    const fileDrop  = document.getElementById('file-drop')

    fileDrop.addEventListener('click', () => fileInput.click())
    fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('over') })
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('over'))
    fileDrop.addEventListener('drop', e => {
      e.preventDefault(); fileDrop.classList.remove('over')
      readFile(e.dataTransfer.files[0])
    })
    fileInput.addEventListener('change', () => readFile(fileInput.files[0]))

    function readFile(file) {
      if (!file) return
      document.getElementById('file-name').textContent =
        `${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`
      const reader = new FileReader()
      reader.onload = e => {
        try { loadData(JSON.parse(e.target.result)) }
        catch { document.getElementById('file-name').textContent = '⚠ JSON 解析失敗'
                document.getElementById('file-name').style.color = 'var(--red)' }
      }
      reader.readAsText(file)
    }

    function loadData(data) {
      jsonData  = data
      crewList  = extractCrew(data)

      // 顯示摘要
      const dates    = data.map(f => f.date).filter(Boolean).sort()
      const minDate  = dates[0]?.slice(0,7) || '?'
      const maxDate  = dates[dates.length-1]?.slice(0,7) || '?'

      document.getElementById('sum-flights').textContent = data.length.toLocaleString()
      document.getElementById('sum-crew').textContent    = crewList.length
      document.getElementById('sum-range').textContent   = `${minDate}~${maxDate}`
      show('data-summary')
      document.getElementById('btn-import').textContent  =
        `開始匯入（${data.length.toLocaleString()} 航班 + ${crewList.length} 機師）`
    }

    // ── 從航班提取機師名單 ─────────────────────────
    function extractCrew(flights) {
      const map = {}
      for (const f of flights) {
        const ids   = f.crew       || []
        const names = f.crewNames  || []
        for (let i = 0; i < ids.length; i++) {
          const id = ids[i]; if (!id || map[id]) continue
          const name   = (names[i] || '').trim()
          const parts  = name.split(/\s+/).filter(Boolean)
          // 中文格式：名 姓（最後一個詞是姓）
          const last   = parts.length > 1 ? parts[parts.length - 1] : ''
          const first  = parts.slice(0, -1).join(' ')
          map[id] = { id, firstName: first || name, lastName: last, position: '' }
        }
      }
      return Object.values(map)
    }

    // ── 開始匯入 ───────────────────────────────────
    document.getElementById('btn-import')?.addEventListener('click', async () => {
      if (!jsonData || !uid || !db) return

      document.getElementById('btn-import').disabled = true
      show('progress-card')

      const logEl  = document.getElementById('log')
      const bar    = document.getElementById('progress-bar')
      const txt    = document.getElementById('progress-text')
      const phase  = document.getElementById('phase-label')

      const addLog = (msg, cls='') => {
        logEl.innerHTML += `<div class="${cls}">${msg}</div>`
        logEl.scrollTop  = logEl.scrollHeight
      }

      // ── Phase 1：匯入航班 ────────────────────────
      phase.textContent = '⬆ Phase 1 / 2 — 匯入航班記錄'
      addLog(`開始匯入 ${jsonData.length.toLocaleString()} 筆航班…`, 'log-inf')

      const col   = collection(db, 'users', uid, 'flights')
      const total = jsonData.length
      let done  = 0, errors = 0

      for (let i = 0; i < total; i += 500) {
        const chunk = jsonData.slice(i, i + 500)
        const batch = writeBatch(db)

        for (const f of chunk) {
          batch.set(doc(col, f.objectId), {
            date:               f.date               || '',
            flightNumber:       f.flightNumber       || '',
            aircraftType:       f.aircraftType        || '',
            registration:       f.registration        || '',
            from:               f.from               || '',
            to:                 f.to                 || '',
            outTime:            f.outTime            || '',
            offTime:            f.offTime            || '',
            onTime:             f.onTime             || '',
            inTime:             f.inTime             || '',
            blockTime:          f.blockTime          || 0,
            flightTime:         f.flightTime         || 0,
            nightTime:          f.nightTime          || 0,
            pfTakeoff:          f.pfTakeoff          ?? false,
            pfLanding:          f.pfLanding          ?? false,
            pic:                f.pic                ?? false,
            autoland:           f.autoland           ?? false,
            goAround:           f.goAround           ?? false,
            diverted:           f.diverted           ?? false,
            approachType:       f.approachType       || '',
            runway:             f.runway || f.runwayFromNumbers || '',
            totalPax:           f.totalPax           || 0,
            totalPayload:       f.totalPayload       || 0,
            flightPlanDistance: f.flightPlanDistance || 0,
            crew:               f.crew               || [],
            crewNames:          f.crewNames          || [],
            createdAt:          serverTimestamp(),
            updatedAt:          serverTimestamp(),
          }, { merge: true })
        }

        try {
          await batch.commit()
          done += chunk.length
          bar.value = Math.round(done / total * 50)  // 前 50%
          txt.textContent = `航班 ${done.toLocaleString()} / ${total.toLocaleString()}`
          addLog(`✓ 航班 batch ${Math.ceil((i+1)/500)} — ${chunk.length} 筆`, 'log-ok')
        } catch (e) {
          errors++
          addLog(`✗ 航班 batch 失敗: ${e.message}`, 'log-err')
        }
      }

      addLog(`航班匯入完成：${done} 筆 ${errors ? `（${errors} 批失敗）` : ''}`,
             errors ? 'log-warn' : 'log-ok')

      // ── Phase 2：匯入機師 ────────────────────────
      phase.textContent = '⬆ Phase 2 / 2 — 匯入機師名單'
      addLog(`\n開始匯入 ${crewList.length} 位機師…`, 'log-inf')

      const crewCol   = collection(db, 'users', uid, 'crew')
      let crewDone    = 0
      let crewErrors  = 0

      // 機師數量不多，逐筆寫入（不需要 batch）
      for (const c of crewList) {
        try {
          await setDoc(doc(crewCol, c.id), {
            firstName: c.firstName,
            lastName:  c.lastName,
            position:  c.position,
          }, { merge: true })
          crewDone++
          bar.value = 50 + Math.round(crewDone / crewList.length * 50)  // 後 50%
          txt.textContent = `機師 ${crewDone} / ${crewList.length}`
        } catch (e) {
          crewErrors++
          addLog(`✗ 機師 ${c.id} 失敗: ${e.message}`, 'log-err')
        }
      }

      addLog(`機師匯入完成：${crewDone} 位 ${crewErrors ? `（${crewErrors} 失敗）` : ''}`,
             crewErrors ? 'log-warn' : 'log-ok')

      // ── 完成 ────────────────────────────────────
      bar.value = 100
      const totalErrors = errors + crewErrors
      addLog(`\n✅ 全部完成！航班 ${done} 筆 + 機師 ${crewDone} 位`,
             totalErrors ? 'log-warn' : 'log-ok')
      phase.textContent = totalErrors
        ? `⚠ 完成（有 ${totalErrors} 個錯誤，可重新執行）`
        : '✅ 匯入成功！可回到 App 查看記錄'

      document.getElementById('btn-import').disabled  = false
      document.getElementById('btn-import').textContent = '再次執行（merge mode，不重複）'
    })

    // ── 工具函數 ───────────────────────────────────
    function show(id) { document.getElementById(id).style.display = '' }
    function setStatus(id, msg, color) {
      const el = document.getElementById(id)
      el.textContent  = msg
      el.style.color  = `var(--${color})`
    }
  </script>
</body>
</html>

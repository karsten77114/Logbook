<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Logbook">
  <meta name="theme-color" content="#121e2c">
  <title>Pilot Logbook</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <!-- Fonts: B612 designed for avionics displays -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=B612+Mono:ital,wght@0,400;0,700;1,400&family=B612:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Leaflet for flight track map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <link rel="stylesheet" href="css/main.css">

  <!-- Firebase v11 modular SDK via importmap -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="splash">
      <div class="splash-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 32 L24 8 L42 32 L24 28 Z" fill="var(--accent)" opacity="0.9"/>
          <path d="M14 32 L24 28 L34 32 L24 36 Z" fill="var(--accent)" opacity="0.5"/>
        </svg>
        <span>LOGBOOK</span>
      </div>
      <div class="splash-spinner"></div>
    </div>
  </div>

  <!-- Chart.js for altitude/speed profiles -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- SunCalc for night time calculation -->
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
